<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Generator</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="generator-app-container">
      <header>
        <h1>Quote Generator</h1>
      </header>

      <main>
        <form>
          <input
          type="text"
          placeholder="Enter the topic of the quote"
          autocomplete="off"
          autofocus
          required
          class="keyword-input"
          />
        <input class="submit-button" type="submit" value="Generate" />
      </form>
      <div class="quote-container" id="quote-container">
        The quote will appear here once you click the "Generate" button.
      </div>
    </main>

    <footer>
      This AI project was coded by
      <a href="https://github.com/TomariCodes" target="_blank"
        >Tomari Southern</a
      >
      and is<a
        href="https://github.com/TomariCodes/quote-generator"
        target="_blank"
      >
        open-sourced on Github</a
      >
      and is
      <a href="https://project-quote-gen.netlify.app/" target="_blank"
        >hosted on Netlify</a
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
